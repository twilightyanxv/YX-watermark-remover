  <!-- Twitter Card -->
  <meta name="twitter:card" content="summary_large_image" />
  <meta name="twitter:title" content="YX图片去水印 - 免费在线去水印工具" />
  <meta name="twitter:description" content="纯本地、免费在线去水印工具。无需上传，保护隐私，智能算法快速去除图片水印。" />
  <meta name="twitter:image" content="https://watermark-remover.yanxv.com/og-image.png" />

  <!-- JSON-LD Structured Data -->
  <script type="application/ld+json">
  {
    "@context": "https://schema.org",
    "@type": "WebApplication",
    "name": "YX图片去水印",
    "alternateName": "YX Watermark Remover",
    "url": "https://watermark-remover.yanxv.com/",
    "description": "纯本地、免费在线去水印工具，无需上传，保护隐私，智能算法快速去除图片水印。",
    "applicationCategory": "Multimedia",
    "operatingSystem": "All",
    "browserRequirements": "Requires JavaScript",
    "offers": {
      "@type": "Offer",
      "price": "0",
      "priceCurrency": "USD"
    }
  }
  </script>

  <title data-i18n="title">YX图片去水印</title>
  <link rel="icon" type="image/svg+xml" href="favicon.svg" />
  <link rel="stylesheet" href="style.css" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/4.7.0/css/font-awesome.min.css" />
</head>
<body>
  <div id="app">
    <aside id="toolbar">
      <div class="tb-header">
        <div class="tb-logo">
          <i class="fa fa-clock-o"></i>
        </div>
        <div class="tb-title">
          <h1 data-i18n="title">YX图片去水印</h1>
          <p data-i18n="subtitle">纯本地处理，保护您的隐私</p>
        </div>
      </div>
      <div class="tb-divider"></div>

      <div class="tb-section">
        <button id="btn-upload" class="btn btn-solid" data-i18n="upload" data-i18n-title="uploadTitle">
          <i class="fa fa-cloud-upload"></i>
          上传图片
        </button>
        <span class="tb-hint" data-i18n="uploadHint">支持 JPG / PNG / WebP 格式</span>
        <input type="file" id="file-input" accept="image/*" hidden />
      </div>

      <div class="tb-row">
        <button id="btn-undo" class="btn btn-light" data-i18n="undo" disabled>
          <i class="fa fa-undo"></i>
          撤销
        </button>
        <button id="btn-clear" class="btn btn-light" data-i18n="clear" disabled>
          <i class="fa fa-trash-o"></i>
          清除
        </button>
      </div>

      <button id="btn-process" class="btn btn-solid btn-lg" data-i18n="process" disabled>
        <i class="fa fa-magic"></i>
        去水印
      </button>

      <button id="btn-compare" class="btn btn-outline" data-i18n="compare" disabled>
        <i class="fa fa-columns"></i>
        对比原图
      </button>

      <div class="tb-row">
        <button id="btn-export" class="btn btn-export" data-i18n="export" disabled>
          <i class="fa fa-download"></i>
          导出结果
        </button>
        <select id="export-format">
          <option value="png" selected>PNG</option>
          <option value="jpeg">JPEG</option>
          <option value="webp">WebP</option>
        </select>
      </div>

      <div class="tb-tip">
        <i class="fa fa-lightbulb-o"></i>
        <span data-i18n="tip">选区越小，速度越快，效果越好哦</span>
      </div>

      <div id="status-bar" class="tb-status">
        <i class="fa fa-cloud"></i>
        <span data-i18n="statusIdle">等待上传图片...</span>
      </div>

      <div class="tb-lang" id="lang-group">
        <span class="lang-opt" data-lang="zh">中</span>
        <span class="lang-opt" data-lang="en">EN</span>
      </div>
    </aside>

    <main id="canvas-container">
      <div id="drop-hint" data-i18n="dropHint">拖拽或点击上传图片</div>
      <canvas id="main-canvas"></canvas>
    </main>
  </div>
  <script type="module" src="src/main.js"></script>
</body>
</html>
